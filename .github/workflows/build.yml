name: Build Only iOS(Unsigned) Skip Android
run-name: Skip Android | Build Unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # NPM依赖缓存
      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Set npm 国内镜像
        run: npm config set registry https://registry.npmmirror.com

      - name: Install NPM dependencies
        run: npm ci

      # 修复cap sync android assets缺失目录（cap同步依旧需要执行，capacitor生成iOS配置）
      - name: Prepare android assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Capacitor sync
        run: npx cap sync

      ###################################################################
      # ========== Android 全部暂时跳过，如需使用解除下面注释 ==========
      ###################################################################
#      # Gradle缓存
#      - name: Cache Gradle
#        uses: actions/cache@v3
#        with:
#          path: |
#            ~/.gradle/caches
#            ~/.gradle/wrapper
#            android/.gradle
#          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*','android/gradle/wrapper/gradle-wrapper.properties') }}

#      - name: Auto Generate Keystore
#        run: |
#          keytool -genkey -v \
#            -keystore android/app/temp-release.keystore \
#            -alias appkey \
#            -keyalg RSA -keysize 2048 -validity 10000 \
#            -storepass 123456 \
#            -keypass 123456 \
#            -dname "CN=Dev, OU=Dev, O=Dev, L=ChongQing, ST=CQ, C=CN"

#      - name: Inject signing config into build.gradle
#        run: |
#          echo "
#          android {
#              signingConfigs {
#                  release {
#                      storeFile file('temp-release.keystore')
#                      storePassword '123456'
#                      keyAlias 'appkey'
#                      keyPassword '123456'
#                  }
#              }
#              buildTypes {
#                  release {
#                      signingConfig signingConfigs.release
#                      minifyEnabled false
#                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
#                  }
#              }
#          }
#          " >> android/app/build.gradle

#      - name: Build Signed Release APK
#        working-directory: ./android
#        run: |
#          chmod +x gradlew
#          ./gradlew assembleRelease
      ###################################################################
      # ===================== Android区块结束 =====================
      ###################################################################

      ##############################
      # iOS 构建流程（正式启用）
      ##############################
      # Pods缓存
      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ios/App/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/App/Podfile.lock') }}

      - name: Install CocoaPods
        run: |
          cd ios/App/App
          pod install --repo-update

      - name: Xcode Archive iOS (No Signing)
        run: |
          cd ios/App/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare export config
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ${{ env.OUTPUT_FOLDER }}

      ##############################
      # 上传产物（仅保留IPA）
      ##############################
#      - name: Upload Signed Android APK
#        uses: actions/upload-artifact@v4
#        with:
#          name: Android-Temp-Signed-APK
#          path: android/app/build/outputs/apk/release/app-release.apk
#          retention-days: 14

      - name: Upload Unsigned iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: ${{ env.OUTPUT_FOLDER }}/*.ipa
          retention-days: 14
