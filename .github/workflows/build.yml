name: Build Only iOS(Unsigned) Skip Android
run-name: Skip Android | Build Unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      # 重建iOS SPM原生工程
      - name: Generate iOS SPM Project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Debug List ios/App
        run: ls -la ${{ env.IOS_ROOT }}

      ##############################
      # 归档：强制关闭所有签名、不绑定团队
      ##############################
      - name: Xcode Archive
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      ##############################
      # 导出修复关键点
      # 1. method改为 `debugging` 替代废弃的development
      # 2. 添加 teamID="" 解决 No Team Found
      # 3. compileBitcode关闭
      ##############################
      - name: Prepare exportOptions.plist
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>debugging</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>teamID</key>
            <string></string>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ${{ env.OUTPUT_FOLDER }}

      # 上传产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: ${{ env.OUTPUT_FOLDER }}/*.ipa
          retention-days: 14
