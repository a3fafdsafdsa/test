name: Build Signed APK + IPA Full
run-name: Full Build Signed APK & IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ANDROID_ROOT: $GITHUB_WORKSPACE/android
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      KEYSTORE_PATH: $GITHUB_WORKSPACE/temp.jks

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: NPM Mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install Dependencies
        run: npm install

      - name: Fix binary execute permission
        run: chmod +x ./node_modules/.bin/*

      - name: Build Web Dist
        run: npm run build

      - name: Create Native Projects
        run: |
          rm -rf ios android
          npx cap add android
          npx cap add ios

      - name: Generate Icons
        run: npx capacitor-assets generate assets/icon.png

      - name: Fix Android Assets
        run: mkdir -p ${{ env.ANDROID_ROOT }}/app/src/main/assets

      - name: Cap Sync
        run: npx cap sync

      - name: Fix Gradle Java Version
        run: |
          sed -i '' 's|VERSION_21|VERSION_17|g' ${{ env.ANDROID_ROOT }}/app/build.gradle

      # 在仓库根目录生成证书
      - name: Generate Temp Keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ env.KEYSTORE_PATH }} \
            -alias testkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass Test@666888 \
            -keypass Test@666888 \
            -dname "CN=User, OU=Dev, O=Dev, L=HZ, S=ZJ, C=CN"

      # ✅ 重点：storeFile 使用完整绝对路径
      - name: Inject Release Signing Config
        run: |
          printf "\nandroid {\n    signingConfigs {\n        releaseTemp {\n            storeFile file(\"%s\")\n            storePassword \"Test@666888\"\n            keyAlias \"testkey\"\n            keyPassword \"Test@666888\"\n        }\n    }\n    buildTypes {\n        release {\n            signingConfig signingConfigs.releaseTemp\n        }\n    }\n}" "${{ env.KEYSTORE_PATH }}" >> ${{ env.ANDROID_ROOT }}/app/build.gradle

      - name: Setup JDK21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build Signed APK
        run: |
          cd ${{ env.ANDROID_ROOT }}
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Xcode Archive iOS
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # ==========新增：xcarchive 导出 IPA ==========
      - name: Export IPA
        run: |
          mkdir -p ./ipa_out
          cat > export.plist <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>development</string>
    <key>signingStyle</key>
    <string>automatic</string>
    <key>signingCertificate</key>
    <string></string>
    <key>compileBitcode</key>
    <false/>
</dict>
</plist>
EOF
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist export.plist \
            -exportPath ./ipa_out

      # 同时复制 APK + IPA 到输出目录
      - name: Copy Outputs
        run: |
          mkdir -p ./output
          cp ${{ env.ANDROID_ROOT }}/app/build/outputs/apk/release/app-release.apk ./output/
          cp ./ipa_out/*.ipa ./output/ || true
          ls -la ./output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 成品包
          path: ./output/
          retention-days: 30
