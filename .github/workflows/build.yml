name: Build Android APK + iOS Unsigned IPA
run-name: Build APK & IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ANDROID_ROOT: $GITHUB_WORKSPACE/android
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_DIR: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      - name: Build frontend dist
        run: npm run build

      - name: Generate Capacitor Native Projects
        run: |
          rm -rf ios android
          npx cap add android
          npx cap add ios
          mkdir -p ${{ env.ANDROID_ROOT }}/app/src/main/assets
          npx cap sync

      - name: Fix Gradle Java Version to 17
        run: |
          sed -i '' 's|VERSION_21|VERSION_17|g' ${{ env.ANDROID_ROOT }}/app/build.gradle

      - name: Setup JDK 17 for Android
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Android Release APK
        run: |
          cd ${{ env.ANDROID_ROOT }}
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Xcode Archive iOS
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # =========【修复】提前创建output，打包后验证文件存在 =========
      - name: Manual Package iOS IPA
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}/Payload
          cp -r "${{ env.ARCHIVE_PATH }}/Products/Applications/App.app" "${{ env.OUTPUT_DIR }}/Payload/"
          cd ${{ env.OUTPUT_DIR }}
          zip -q -r App.ipa Payload
          rm -rf Payload
          ls -la ${{ env.OUTPUT_DIR }}

      - name: Copy APK to Output
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cp ${{ env.ANDROID_ROOT }}/app/build/outputs/apk/release/app-release-unsigned.apk ${{ env.OUTPUT_DIR }}/
          ls -la ${{ env.OUTPUT_DIR }}

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Artifacts
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 14
