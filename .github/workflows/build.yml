name: Build Only iOS(Unsigned) Skip Android
run-name: Skip Android | Build Unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      BASE: $GITHUB_WORKSPACE
      IOS_PROJECT_ROOT: $GITHUB_WORKSPACE/ios/App
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # NPM缓存
      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Set npm 国内镜像
        run: npm config set registry https://registry.npmmirror.com

      - name: Install NPM dependencies
        run: npm ci

      # 目录打印校验
      - name: Check iOS Root Directory
        run: |
          echo "iOS项目根目录: ${{ env.IOS_PROJECT_ROOT }}"
          ls -la ${{ env.IOS_PROJECT_ROOT }}

      - name: Prepare android assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Capacitor sync android
        run: npx cap sync android

      ###################################################################
      # Android 构建全部注释，暂时跳过
      ###################################################################

      ##############################
      # iOS 构建流程（Podfile 在 ios/App）
      ##############################
      # CocoaPods缓存
      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ${{ env.IOS_PROJECT_ROOT }}/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('${{ env.IOS_PROJECT_ROOT }}/Podfile.lock') }}

      - name: Install CocoaPods
        run: |
          cd ${{ env.IOS_PROJECT_ROOT }}
          pod install --repo-update

      - name: Xcode Archive iOS (No Signing)
        run: |
          cd ${{ env.IOS_PROJECT_ROOT }}
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare export config
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ${{ env.OUTPUT_FOLDER }}

      ##############################
      # 上传IPA产物
      ##############################
      - name: Upload Unsigned iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: ${{ env.OUTPUT_FOLDER }}/*.ipa
          retention-days: 14
