name: Build App Android(TempKey) + iOS(Unsigned)
run-name: Temp Keystore Android + Unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      APP_ID: com.ctq.qmc.yiban.product
      KEYSTORE_FILE: android/app/temp-release.keystore
      KEYSTORE_PWD: 123456
      KEY_ALIAS: appkey
      KEY_PWD: 123456
      IOS_ROOT: ios/App/App
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install NPM dependencies
        run: npm ci

      # 修复cap sync android assets缺失
      - name: Prepare android assets folder
        run: mkdir -p android/app/src/main/assets

      - name: Capacitor sync
        run: npx cap sync

      ##############################
      # Android 编译（临时自动签名APK）
      ##############################
      - name: Auto Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ env.KEYSTORE_FILE }} \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ env.KEYSTORE_PWD }} \
            -keypass ${{ env.KEY_PWD }} \
            -dname "CN=Dev, OU=Dev, O=Dev, L=ChongQing, ST=CQ, C=CN"

      - name: Inject signing config into build.gradle
        run: |
          echo "
          android {
              signingConfigs {
                  release {
                      storeFile file('temp-release.keystore')
                      storePassword '${{ env.KEYSTORE_PWD }}'
                      keyAlias '${{ env.KEY_ALIAS }}'
                      keyPassword '${{ env.KEY_PWD }}'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
          }
          " >> android/app/build.gradle

      - name: Build Signed Release APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      ##############################
      # iOS 整套【完全修复版本】
      ##############################
      - name: Install CocoaPods
        working-directory: ${{ env.IOS_ROOT }}
        run: pod install --repo-update

      - name: Xcode Archive iOS (No Signing)
        working-directory: ${{ env.IOS_ROOT }}
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare export config
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>provisioningProfiles</key>
            <dict/>
            <key>signingCertificateSubject</key>
            <string></string>
          </dict>
          </plist>
          EOF

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ${{ env.OUTPUT_FOLDER }}

      ##############################
      # 上传产物
      ##############################
      - name: Upload Signed Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-Temp-Signed-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Upload Unsigned iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: ${{ env.OUTPUT_FOLDER }}/*.ipa
          retention-days: 14
