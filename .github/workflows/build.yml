name: Build Only iOS(Unsigned) Skip Android
run-name: Skip Android | Build Unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm 淘宝镜像
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      # =================核心修复：增加 --pod 强制生成CocoaPods工程=================
      - name: Generate iOS native project (Force CocoaPods)
        run: |
          rm -rf ios
          npx cap add ios --pod
          npx cap sync ios
          
      # 打印目录核对
      - name: Debug List ios/App
        run: |
          echo "==== ios/App 目录 ===="
          ls -la $GITHUB_WORKSPACE/ios/App

      ##############################
      # iOS 编译流程
      ##############################
      - name: Pod install
        run: |
          cd ${{ env.IOS_ROOT }}
          pod install --repo-update

      - name: Xcode Archive (No Sign)
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare exportOptions
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ${{ env.OUTPUT_FOLDER }}

      # 上传产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: ${{ env.OUTPUT_FOLDER }}/*.ipa
          retention-days: 14
