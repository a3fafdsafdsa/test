name: Build Android APK + iOS Unsigned IPA
run-name: Build APK & IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ANDROID_ROOT: $GITHUB_WORKSPACE/android
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      - name: Build frontend dist
        run: npm run build

      ###################################################################
      # 生成双平台原生工程
      ###################################################################
      - name: Generate Capacitor Native Projects
        run: |
          rm -rf ios android
          npx cap add android
          npx cap add ios
          mkdir -p ${{ env.ANDROID_ROOT }}/app/src/main/assets
          npx cap sync

      ###################################################################
      # Android 【修复】升级 JDK 21
      ###################################################################
      - name: Setup JDK 21 for Android
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 强制Gradle使用JDK21编译
      - name: Build Android Release APK
        run: |
          cd ${{ env.ANDROID_ROOT }}
          chmod +x gradlew
          ./gradlew assembleRelease -Porg.gradle.java.home=${{ env.JAVA_HOME }}

      ###################################################################
      # iOS Archive 编译（SPM项目，无CocoaPods）
      ###################################################################
      - name: Xcode Archive iOS
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      ###################################################################
      # iOS 手动打包IPA（绕开teamID校验）
      ###################################################################
      - name: Manual Package iOS IPA
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}/Payload
          cp -r "${{ env.ARCHIVE_PATH }}/Products/Applications/App.app" "${{ env.OUTPUT_FOLDER }}/Payload/"
          cd ${{ env.OUTPUT_FOLDER }}
          zip -q -r App.ipa Payload
          rm -rf Payload

      ###################################################################
      # 复制APK到输出目录
      ###################################################################
      - name: Copy Android APK to Output
        run: |
          cp ${{ env.ANDROID_ROOT }}/app/build/outputs/apk/release/app-release-unsigned.apk ${{ env.OUTPUT_FOLDER }}/app-release-unsigned.apk

      ###################################################################
      # 上传产物
      ###################################################################
      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Artifacts
          path: |
            ${{ env.OUTPUT_FOLDER }}/App.ipa
            ${{ env.OUTPUT_FOLDER }}/app-release-unsigned.apk
          retention-days: 14
