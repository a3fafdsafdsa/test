name: Build Android Signed APK + iOS Unsigned IPA
run-name: Build Signed APK & IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ANDROID_ROOT: $GITHUB_WORKSPACE/android
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_DIR: $GITHUB_WORKSPACE/output
      # 临时签名配置（流水线运行时动态使用，无需提前上传）
      KEYSTORE_FILE: $GITHUB_WORKSPACE/temp-key.jks
      KEYSTORE_PASS: Temp@123456
      KEY_ALIAS: tempkey
      KEY_PASS: Temp@123456
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      - name: Build frontend dist
        run: npm run build

      - name: Generate Capacitor Native Projects
        run: |
          rm -rf ios android
          npx cap add android
          npx cap add ios

      # 自动生成各尺寸应用图标
      - name: Generate App Icon
        run: npm run assets

      - name: Prepare android assets dir
        run: mkdir -p ${{ env.ANDROID_ROOT }}/app/src/main/assets

      - name: Capacitor Sync
        run: npx cap sync

      # 修复Gradle Java版本 21→17
      - name: Fix Gradle Java Version to 17
        run: |
          sed -i '' 's|VERSION_21|VERSION_17|g' ${{ env.ANDROID_ROOT }}/app/build.gradle

      # ======================【新增1】动态生成临时密钥库 ======================
      - name: Generate temporary keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ env.KEYSTORE_FILE }} \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ env.KEYSTORE_PASS }} \
            -keypass ${{ env.KEY_PASS }} \
            -dname "CN=TempDev, OU=Dev, O=Company, L=City, S=State, C=CN"

      # ======================【新增2】动态修改build.gradle开启Release签名 ======================
      - name: Inject signing config into build.gradle
        run: |
          cat >> ${{ env.ANDROID_ROOT }}/app/build.gradle <<EOF

android {
    signingConfigs {
        releaseSign {
            storeFile file("${{ env.KEYSTORE_FILE }}")
            storePassword "${{ env.KEYSTORE_PASS }}"
            keyAlias "${{ env.KEY_ALIAS }}"
            keyPassword "${{ env.KEY_PASS }}"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.releaseSign
        }
    }
}
EOF

      - name: Setup JDK 17 for Android
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 编译【已签名Release APK】
      - name: Build Signed Release APK
        run: |
          cd ${{ env.ANDROID_ROOT }}
          chmod +x gradlew
          ./gradlew assembleRelease

      # iOS SPM 归档编译
      - name: Xcode Archive iOS
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # 手动打包IPA，绕过TeamID导出限制
      - name: Manual Package iOS IPA
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}/Payload
          cp -r "${{ env.ARCHIVE_PATH }}/Products/Applications/App.app" "${{ env.OUTPUT_DIR }}/Payload/"
          cd ${{ env.OUTPUT_DIR }}
          zip -q -r App.ipa Payload
          rm -rf Payload

      # 复制【签名APK】到输出目录
      - name: Copy Signed APK to Output
        run: |
          cp ${{ env.ANDROID_ROOT }}/app/build/outputs/apk/release/app-release.apk ${{ env.OUTPUT_DIR }}/

      # 上传产物
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Artifacts
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 14
